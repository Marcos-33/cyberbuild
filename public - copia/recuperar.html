<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <title>Recuperar contraseña - Cyberbuild</title>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Cyberbuild</h1>
                <h2>Recuperar contraseña</h2>
            </div>

            <form action="../controllers/AuthController.php?action=resetPassword" method="POST" class="login-form">
                <div class="form-group">
                    <label for="dni">DNI:</label>
                    <input 
                        type="text" 
                        id="dni" 
                        name="dni" 
                        placeholder="Ej: 12345678A" 
                        class="form-control" 
                        required
                        pattern="[0-9]{8}[A-Z]"
                        title="Ingresa DNI válido (8 números + 1 letra)"
                    >
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@correo.com" 
                        class="form-control" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="new_password">Nueva contraseña:</label>
                    <input 
                        type="password" 
                        id="new_password" 
                        name="new_password" 
                        placeholder="Mínimo 8 caracteres" 
                        class="form-control" 
                        required
                        minlength="8"
                        title="La contraseña debe tener al menos 8 caracteres"
                    >
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirmar contraseña:</label>
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        placeholder="Repite la contraseña" 
                        class="form-control" 
                        required
                        minlength="8"
                    >
                </div>

                <div id="password-match-error" class="form-error"></div>

                <button type="submit" class="btn btn-primary btn-block">Actualizar contraseña</button>
                <a href="index.html" class="btn btn-secondary btn-block">Volver a iniciar sesión</a>
            </form>

            <div class="login-footer">
                <p>¿No tienes cuenta? Contacta con un administrador</p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Validar que las contraseñas coincidan
        document.querySelector('.login-form').addEventListener('submit', function(e) {
            const password = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('password-match-error');

            if (password !== confirmPassword) {
                e.preventDefault();
                errorDiv.textContent = 'Las contraseñas no coinciden';
                errorDiv.style.display = 'block';
                return false;
            }
            errorDiv.style.display = 'none';
        });

        // Limpiar mensaje de error cuando el usuario empieza a escribir
        document.getElementById('confirm_password').addEventListener('input', function() {
            document.getElementById('password-match-error').style.display = 'none';
        });
    </script>
</body>
</html>
